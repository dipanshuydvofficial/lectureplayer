<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lecture Player</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text: #1a1917;
      --muted: #8a8780;
      --accent: #2a2a2a;
      --active: #1a1917;
      --pill-bg: #eeecea;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 28px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }
    header span {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--border);
    }

    .player-card {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* URL Bar */
    .url-bar {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .url-bar input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .url-bar input:focus { border-color: var(--accent); }
    .url-bar input::placeholder { color: var(--muted); }
    .url-bar button {
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .url-bar button:hover { opacity: 0.85; }

    /* Video */
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      background: #111;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #555;
    }
    .video-placeholder svg { opacity: 0.3; }
    .video-placeholder p { font-size: 13px; opacity: 0.5; }

    /* Controls */
    .controls {
      padding: 18px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    /* Speed Section */
    .speed-section { display: flex; flex-direction: column; gap: 10px; }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .speed-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .speed-pill {
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      padding: 6px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--pill-bg);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }
    .speed-pill:hover { border-color: var(--accent); color: var(--accent); }
    .speed-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-row span {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 28px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .speed-display {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
      min-width: 52px;
      text-align: right;
    }
    .speed-display sub {
      font-size: 11px;
      color: var(--muted);
      vertical-align: baseline;
      margin-left: 2px;
    }

    /* Divider */
    .divider { height: 1px; background: var(--border); }

    /* Extra Controls Row */
    .extra-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn svg { flex-shrink: 0; }

    /* Status bar */
    .status-bar {
      padding: 10px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .status-dot.active { background: #4caf7d; }
    .status-text {
      font-size: 11.5px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent);
      color: #fff;
      font-size: 12.5px;
      padding: 9px 18px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Lecture Player</h1>
  <span>///</span>
</header>

<div class="player-card">
  <!-- URL Bar -->
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Paste YouTube URL or video ID…" value="https://www.youtube.com/watch?v=rfscVS0vtbw"/>
    <button onclick="loadVideo()">Load</button>
  </div>

  <!-- Video -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      <p>Paste a YouTube URL above and hit Load</p>
    </div>
    <iframe id="ytFrame" style="display:none"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Speed -->
    <div class="speed-section">
      <div class="speed-row">
        <span class="controls-label">Playback Speed</span>
        <div style="flex:1"></div>
        <div class="speed-display" id="speedDisplay">1.0<sub>×</sub></div>
      </div>

      <!-- Presets -->
      <div class="speed-pills" id="speedPills">
        <div class="speed-pill" data-speed="0.5">0.5×</div>
        <div class="speed-pill" data-speed="0.75">0.75×</div>
        <div class="speed-pill active" data-speed="1">1×</div>
        <div class="speed-pill" data-speed="1.25">1.25×</div>
        <div class="speed-pill" data-speed="1.5">1.5×</div>
        <div class="speed-pill" data-speed="1.75">1.75×</div>
        <div class="speed-pill" data-speed="2">2×</div>
        <div class="speed-pill" data-speed="2.25">2.25×</div>
        <div class="speed-pill" data-speed="2.5">2.5×</div>
        <div class="speed-pill" data-speed="2.75">2.75×</div>
        <div class="speed-pill" data-speed="3">3×</div>
      </div>

      <!-- Fine slider -->
      <div class="slider-row">
        <span>0.25</span>
        <input type="range" id="speedSlider" min="0.25" max="3" step="0.05" value="1"/>
        <span>3.0</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Extra actions -->
    <div class="extra-row">
      <button class="icon-btn" onclick="stepSpeed(-0.25)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        −0.25×
      </button>
      <button class="icon-btn" onclick="stepSpeed(0.25)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        +0.25×
      </button>
      <button class="icon-btn" onclick="resetSpeed()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset
      </button>
      <div style="flex:1"></div>
      <button class="icon-btn" onclick="copyTimestamp()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy link
      </button>
    </div>

  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">No video loaded</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let player = null;
  let currentSpeed = 1;
  let videoId = null;

  /* ── YouTube IFrame API ── */
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = () => {
    // Auto-load default video
    loadVideo();
  };

  function extractVideoId(url) {
    url = url.trim();
    // Plain ID
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
      return u.searchParams.get('v');
    } catch { return null; }
  }

  function loadVideo() {
    const raw = document.getElementById('urlInput').value;
    const vid = extractVideoId(raw);
    if (!vid) { showToast('Invalid YouTube URL or ID'); return; }
    videoId = vid;

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('ytFrame').style.display = 'none';

    if (player) {
      player.destroy();
      player = null;
    }

    const frame = document.getElementById('ytFrame');
    frame.style.display = 'block';

    player = new YT.Player('ytFrame', {
      videoId: vid,
      playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onReady: (e) => {
          e.target.setPlaybackRate(currentSpeed);
          setStatus(true, 'Ready · ' + vid);
        },
        onStateChange: (e) => {
          const states = { '-1':'Unstarted', 0:'Ended', 1:'Playing', 2:'Paused', 3:'Buffering', 5:'Cued' };
          setStatus(e.data === 1, (states[e.data] || 'Idle') + ' · ' + vid);
        }
      }
    });
  }

  function setSpeed(val) {
    val = Math.round(val * 100) / 100;
    val = Math.min(3, Math.max(0.25, val));
    currentSpeed = val;

    document.getElementById('speedDisplay').innerHTML = val.toFixed(2).replace(/\.?0+$/, m => m === '' ? '' : m) + '<sub>×</sub>';
    document.getElementById('speedSlider').value = val;

    // Update pills
    document.querySelectorAll('.speed-pill').forEach(p => {
      p.classList.toggle('active', parseFloat(p.dataset.speed) === val);
    });

    if (player && player.setPlaybackRate) {
      player.setPlaybackRate(val);
    }

    showToast('Speed: ' + val + '×');
  }

  function stepSpeed(delta) { setSpeed(currentSpeed + delta); }
  function resetSpeed() { setSpeed(1); }

  function setStatus(active, text) {
    document.getElementById('statusDot').classList.toggle('active', active);
    document.getElementById('statusText').textContent = text;
  }

  // Pills
  document.getElementById('speedPills').addEventListener('click', e => {
    const pill = e.target.closest('.speed-pill');
    if (pill) setSpeed(parseFloat(pill.dataset.speed));
  });

  // Slider
  document.getElementById('speedSlider').addEventListener('input', e => {
    setSpeed(parseFloat(e.target.value));
  });

  // Copy timestamp link
  function copyTimestamp() {
    if (!videoId) { showToast('No video loaded'); return; }
    const t = player && player.getCurrentTime ? Math.floor(player.getCurrentTime()) : 0;
    const url = `https://youtu.be/${videoId}?t=${t}`;
    navigator.clipboard.writeText(url).then(() => showToast('Copied link at ' + formatTime(t)));
  }

  function formatTime(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + String(sec).padStart(2,'0');
  }

  // Toast
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '+' || e.key === '=') { stepSpeed(0.25); }
    if (e.key === '-') { stepSpeed(-0.25); }
    if (e.key === '0') { resetSpeed(); }
  });
</script>
</body>
</html>
